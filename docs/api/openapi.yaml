openapi: 3.1.0
info:
  title: Leverly API
  version: 0.1.0
  description: Versioned JSON API for Leverly.
servers:
  - url: /api/v1
    description: Versioned API base path
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - System
      summary: Get API health metadata
      responses:
        '200':
          description: API is reachable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - meta
      properties:
        status:
          type: string
          enum:
            - ok
        meta:
          type: object
          additionalProperties: false
          required:
            - api_version
            - timestamp
          properties:
            api_version:
              type: string
              enum:
                - v1
            timestamp:
              type: string
              format: date-time
