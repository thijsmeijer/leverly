openapi: 3.1.0
info:
  title: 'Leverly API'
  description: 'Versioned JSON API for Leverly.'
  version: 0.1.0
servers:
  -
    url: /api/v1
tags:
  -
    name: Auth
    description: ''
  -
    name: System
    description: ''
paths:
  /me:
    get:
      summary: 'Get the current user'
      operationId: getTheCurrentUser
      description: 'Returns the signed-in athlete account for the first-party web app.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string, description: 'Stable user identifier.' }
                      name: { type: string, description: 'Display name used for account access.' }
                      email: { type: string, description: 'Account email address.' }
                    required:
                      - id
                      - name
                      - email
                    description: 'Current user account.'
                required:
                  - data
      tags:
        - Auth
  /health:
    get:
      summary: 'Get API health metadata'
      operationId: getAPIHealthMetadata
      description: 'Returns a small safe payload for environment smoke checks.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: 'Health state.'
                    enum:
                      - ok
                  meta:
                    type: object
                    properties:
                      api_version: { type: string, description: 'Versioned API namespace.', enum: [v1] }
                      timestamp: { type: string, description: 'ISO-8601 server timestamp.' }
                    required:
                      - api_version
                      - timestamp
                    description: 'Metadata for this health response.'
                required:
                  - status
                  - meta
      tags:
        - System
      security: []
