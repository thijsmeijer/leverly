openapi: 3.1.0
info:
  title: 'Leverly API'
  description: 'Versioned JSON API for Leverly.'
  version: 0.1.0
servers:
  -
    url: /api/v1
tags:
  -
    name: Auth
    description: ''
  -
    name: Onboarding
    description: ''
  -
    name: Profile
    description: ''
  -
    name: System
    description: ''
paths:
  /me:
    get:
      summary: 'Get the current user'
      operationId: getTheCurrentUser
      description: 'Returns the signed-in athlete account for the first-party web app.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string, description: 'Stable user identifier.' }
                      name: { type: string, description: 'Display name used for account access.' }
                      email: { type: string, description: 'Account email address.' }
                    required:
                      - id
                      - name
                      - email
                    description: 'Current user account.'
                required:
                  - data
      tags:
        - Auth
  /me/onboarding:
    get:
      summary: 'Get onboarding state'
      operationId: getOnboardingState
      description: 'Returns the signed-in athlete onboarding draft or completed onboarding answers.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      user_id: { type: string }
                      age_years: { type: integer }
                      training_age_months: { type: integer }
                      experience_level: { type: string }
                      current_bodyweight_value: { type: number }
                      bodyweight_unit: { type: string }
                      height_value: { type: integer }
                      height_unit: { type: string }
                      prior_sport_background: { type: array, items: { type: string } }
                      primary_goal: { type: string }
                      secondary_goals: { type: array, items: { type: string } }
                      target_skills: { type: array, items: { type: string } }
                      primary_target_skill: { type: string }
                      secondary_target_skills: { type: array, items: { type: string } }
                      long_term_target_skills: { type: array, items: { type: string } }
                      base_focus_areas: { type: array, items: { type: string } }
                      roadmap_suggestions: { type: object, properties: { level: { type: string }, summary: { type: string } } }
                      available_equipment: { type: array, items: { type: string } }
                      training_locations: { type: array, items: { type: string } }
                      preferred_training_days: { type: array, items: { type: string } }
                      preferred_session_minutes: { type: integer }
                      weekly_session_goal: { type: integer }
                      preferred_training_time: { type: string }
                      current_level_tests: { type: object, properties: { push_ups: { type: object, properties: { max_strict_reps: { type: integer } } }, rows: { type: object, properties: { progression: { type: string }, max_strict_reps: { type: integer } } }, pull_ups: { type: object, properties: { max_strict_reps: { type: integer }, progression: { type: string } } }, dips: { type: object, properties: { progression: { type: string }, support_hold_seconds: { type: integer } } }, squat: { type: object, properties: { max_reps: { type: integer }, progression: { type: string } } }, hollow_hold_seconds: { type: integer }, wall_handstand_seconds: { type: integer } }, description: 'Baseline push-up, pull-up, squat, and hollow hold tests.' }
                      skill_statuses: { type: object, properties: { handstand: { type: object, properties: { status: { type: string }, best_hold_seconds: { type: integer } } } } }
                      mobility_checks: { type: object, properties: { wrist_extension: { type: string }, shoulder_flexion: { type: string } } }
                      weighted_baselines: { type: object, properties: { experience: { type: string }, unit: { type: string }, movements: { type: array } } }
                      readiness_rating: { type: integer }
                      sleep_quality: { type: integer }
                      soreness_level: { type: integer }
                      pain_level: { type: integer }
                      pain_areas: { type: array }
                      pain_notes: { type: [string, 'null'] }
                      starter_plan_key: { type: string }
                      is_complete: { type: boolean }
                      completed_at: { type: [string, 'null'] }
                      missing_sections: { type: array, description: 'Sections still needed before onboarding can be completed.' }
                    required:
                      - current_level_tests
                      - missing_sections
                    description: 'Athlete onboarding answers.'
                required:
                  - data
      tags:
        - Onboarding
    patch:
      summary: 'Update onboarding state'
      operationId: updateOnboardingState
      description: 'Creates, updates, resumes, or completes signed-in athlete onboarding answers.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      user_id: { type: string }
                      age_years: { type: integer }
                      training_age_months: { type: integer }
                      experience_level: { type: string }
                      current_bodyweight_value: { type: number }
                      bodyweight_unit: { type: string }
                      height_value: { type: integer }
                      height_unit: { type: string }
                      prior_sport_background: { type: array, items: { type: string } }
                      primary_goal: { type: string }
                      secondary_goals: { type: array, items: { type: string } }
                      target_skills: { type: array, items: { type: string } }
                      primary_target_skill: { type: string }
                      secondary_target_skills: { type: array, items: { type: string } }
                      long_term_target_skills: { type: array, items: { type: string } }
                      base_focus_areas: { type: array, items: { type: string } }
                      roadmap_suggestions: { type: object, properties: { level: { type: string }, summary: { type: string } } }
                      available_equipment: { type: array, items: { type: string } }
                      training_locations: { type: array, items: { type: string } }
                      preferred_training_days: { type: array, items: { type: string } }
                      preferred_session_minutes: { type: integer }
                      weekly_session_goal: { type: integer }
                      preferred_training_time: { type: string }
                      current_level_tests: { type: object, properties: { push_ups: { type: object, properties: { max_strict_reps: { type: integer } } }, rows: { type: object, properties: { progression: { type: string }, max_strict_reps: { type: integer } } }, pull_ups: { type: object, properties: { max_strict_reps: { type: integer }, progression: { type: string } } }, dips: { type: object, properties: { progression: { type: string }, support_hold_seconds: { type: integer } } }, squat: { type: object, properties: { max_reps: { type: integer }, progression: { type: string } } }, hollow_hold_seconds: { type: integer }, wall_handstand_seconds: { type: integer } } }
                      skill_statuses: { type: object, properties: { handstand: { type: object, properties: { status: { type: string }, best_hold_seconds: { type: integer } } } } }
                      mobility_checks: { type: object, properties: { wrist_extension: { type: string }, shoulder_flexion: { type: string } } }
                      weighted_baselines: { type: object, properties: { experience: { type: string }, unit: { type: string }, movements: { type: array } } }
                      readiness_rating: { type: integer }
                      sleep_quality: { type: integer }
                      soreness_level: { type: integer }
                      pain_level: { type: integer }
                      pain_areas: { type: array }
                      pain_notes: { type: [string, 'null'] }
                      starter_plan_key: { type: string }
                      is_complete: { type: boolean }
                      completed_at: { type: string }
                      missing_sections: { type: array }
      tags:
        - Onboarding
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                complete:
                  type: boolean
                  description: 'When true, validates and marks onboarding complete.'
                age_years:
                  type:
                    - integer
                    - 'null'
                  description: 'Athlete age in years. Must be at least 13. Must not be greater than 90.'
                training_age_months:
                  type:
                    - integer
                    - 'null'
                  description: 'Total training experience in months. Must be at least 0. Must not be greater than 1200.'
                experience_level:
                  type: string
                  description: 'Self-assessed training experience band.'
                  enum:
                    - new
                    - beginner
                    - intermediate
                    - advanced
                    - elite
                current_bodyweight_value:
                  type:
                    - number
                    - 'null'
                  description: 'Current bodyweight in the selected unit. Must be at least 20. Must not be greater than 400.'
                bodyweight_unit:
                  type: string
                  description: 'Bodyweight unit.'
                  enum:
                    - kg
                    - lb
                height_value:
                  type:
                    - number
                    - 'null'
                  description: 'Current height in the selected unit. Must be at least 36. Must not be greater than 250.'
                height_unit:
                  type: string
                  description: 'Height unit.'
                  enum:
                    - cm
                    - in
                prior_sport_background:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - none
                      - strength_training
                      - gymnastics
                      - climbing
                      - martial_arts
                      - endurance_sport
                      - team_sport
                      - dance_or_mobility
                      - other
                primary_goal:
                  type:
                    - string
                    - 'null'
                  description: 'Primary training goal.'
                  enum:
                    - strength
                    - hypertrophy
                    - skill
                    - endurance
                    - general_fitness
                    - mobility
                    - conditioning
                secondary_goals:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - strength
                      - hypertrophy
                      - skill
                      - endurance
                      - general_fitness
                      - mobility
                      - conditioning
                target_skills:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - strict_push_up
                      - one_arm_push_up
                      - strict_pull_up
                      - weighted_pull_up
                      - strict_dip
                      - ring_dip
                      - weighted_dip
                      - muscle_up
                      - weighted_muscle_up
                      - l_sit
                      - v_sit
                      - handstand
                      - handstand_push_up
                      - press_to_handstand
                      - front_lever
                      - back_lever
                      - planche
                      - pistol_squat
                      - nordic_curl
                      - one_arm_pull_up
                      - human_flag
                primary_target_skill:
                  type:
                    - string
                    - 'null'
                  description: 'The one roadmap the first plan should prioritize.'
                  enum:
                    - strict_push_up
                    - one_arm_push_up
                    - strict_pull_up
                    - weighted_pull_up
                    - strict_dip
                    - ring_dip
                    - weighted_dip
                    - muscle_up
                    - weighted_muscle_up
                    - l_sit
                    - v_sit
                    - handstand
                    - handstand_push_up
                    - press_to_handstand
                    - front_lever
                    - back_lever
                    - planche
                    - pistol_squat
                    - nordic_curl
                    - one_arm_pull_up
                    - human_flag
                secondary_target_skills:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - strict_push_up
                      - one_arm_push_up
                      - strict_pull_up
                      - weighted_pull_up
                      - strict_dip
                      - ring_dip
                      - weighted_dip
                      - muscle_up
                      - weighted_muscle_up
                      - l_sit
                      - v_sit
                      - handstand
                      - handstand_push_up
                      - press_to_handstand
                      - front_lever
                      - back_lever
                      - planche
                      - pistol_squat
                      - nordic_curl
                      - one_arm_pull_up
                      - human_flag
                long_term_target_skills:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - strict_push_up
                      - one_arm_push_up
                      - strict_pull_up
                      - weighted_pull_up
                      - strict_dip
                      - ring_dip
                      - weighted_dip
                      - muscle_up
                      - weighted_muscle_up
                      - l_sit
                      - v_sit
                      - handstand
                      - handstand_push_up
                      - press_to_handstand
                      - front_lever
                      - back_lever
                      - planche
                      - pistol_squat
                      - nordic_curl
                      - one_arm_pull_up
                      - human_flag
                base_focus_areas:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - push_capacity
                      - pull_capacity
                      - dip_support
                      - row_volume
                      - leg_strength
                      - core_bodyline
                      - compression
                      - handstand_line
                      - straight_arm_tolerance
                      - mobility_positions
                      - weighted_strength
                      - conditioning_base
                available_equipment:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - pull_up_bar
                      - low_bar
                      - dip_bars
                      - parallel_bars
                      - stall_bars
                      - parallettes
                      - rings
                      - resistance_band
                      - box_bench
                      - weight_vest
                      - dip_belt
                      - weighted_backpack
                      - suspension_trainer
                      - ab_wheel
                      - jump_rope
                      - training_mat
                training_locations:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - home
                      - gym
                      - park
                      - travel
                      - other
                preferred_training_days:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - monday
                      - tuesday
                      - wednesday
                      - thursday
                      - friday
                      - saturday
                      - sunday
                preferred_session_minutes:
                  type:
                    - integer
                    - 'null'
                  description: 'Maximum session length in minutes. Must be at least 10. Must not be greater than 240.'
                weekly_session_goal:
                  type:
                    - integer
                    - 'null'
                  description: 'Target sessions per week. Must be at least 1. Must not be greater than 14.'
                preferred_training_time:
                  type: string
                  description: 'Preferred training time.'
                  enum:
                    - morning
                    - midday
                    - evening
                    - flexible
                current_level_tests:
                  type: object
                  description: 'Baseline tests for starter recommendation placement.'
                  properties:
                    push_ups:
                      type: object
                      description: ''
                      properties: { progression: { type: [string, 'null'], description: '', enum: [wall_push_up, incline_push_up, knee_push_up, strict_push_up, diamond_push_up, decline_push_up, pseudo_planche_push_up, ring_push_up, archer_push_up, one_arm_assisted_push_up, one_arm_push_up] }, max_strict_reps: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 200.' }, form_quality: { type: [integer, 'null'], description: 'Must be at least 1. Must not be greater than 5.' } }
                    rows:
                      type: object
                      description: ''
                      properties: { progression: { type: [string, 'null'], description: '', enum: [vertical_row, inverted_row, horizontal_row, feet_elevated_row, ring_row, tuck_front_lever_row] }, max_strict_reps: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 200.' } }
                    pull_ups:
                      type: object
                      description: ''
                      properties: { max_strict_reps: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 100.' }, progression: { type: [string, 'null'], description: '', enum: [dead_hang, scapular_pull, flexed_arm_hang, inverted_row, band_assisted_pull_up, foot_assisted_pull_up, eccentric_pull_up, strict_pull_up, chest_to_bar_pull_up, weighted_pull_up, archer_pull_up] }, assistance: { type: [string, 'null'], description: 'Must not be greater than 80 characters.' }, form_quality: { type: [integer, 'null'], description: 'Must be at least 1. Must not be greater than 5.' } }
                    dips:
                      type: object
                      description: ''
                      properties: { progression: { type: [string, 'null'], description: '', enum: [support_hold, box_dip, bench_dip, assisted_bar_dip, bar_dip, deep_bar_dip, straight_bar_dip, ring_support_hold, assisted_ring_dip, ring_dip, weighted_dip] }, max_strict_reps: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 100.' }, support_hold_seconds: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 600.' } }
                    squat:
                      type: object
                      description: ''
                      properties: { max_reps: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 300.' }, progression: { type: [string, 'null'], description: '', enum: [box_squat, air_squat, reverse_lunge, split_squat, deep_step_up, assisted_pistol, shrimp_squat, pistol_squat, weighted_pistol] } }
                    hollow_hold_seconds:
                      type: [integer, 'null']
                      description: 'Must be at least 0. Must not be greater than 600.'
                    arch_hold_seconds:
                      type: [integer, 'null']
                      description: 'Must be at least 0. Must not be greater than 600.'
                    dead_hang_seconds:
                      type: [integer, 'null']
                      description: 'Must be at least 0. Must not be greater than 600.'
                    support_hold_seconds:
                      type: [integer, 'null']
                      description: 'Must be at least 0. Must not be greater than 600.'
                    wall_handstand_seconds:
                      type: [integer, 'null']
                      description: 'Must be at least 0. Must not be greater than 600.'
                    l_sit_hold_seconds:
                      type: [integer, 'null']
                      description: 'Must be at least 0. Must not be greater than 600.'
                skill_statuses:
                  type: array
                  description: ''
                  items:
                    type: object
                    properties:
                      status: { type: string, description: '', enum: [not_started, building_base, assisted, partial_range, single_rep, multiple_reps, short_hold, solid_hold, advanced_variation] }
                      max_strict_reps: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 100.' }
                      best_hold_seconds: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 600.' }
                      notes: { type: [string, 'null'], description: 'Must not be greater than 300 characters.' }
                    required:
                      - status
                mobility_checks:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - not_tested
                      - clear
                      - limited
                      - blocked
                      - painful
                weighted_baselines:
                  type: object
                  description: 'Optional weighted calisthenics experience and recent tested sets.'
                  properties:
                    experience:
                      type: string
                      description: ''
                      enum: [none, curious, repetition_work, strength_cycles, competition_style]
                    unit:
                      type: string
                      description: ''
                      enum: [kg, lb]
                    movements:
                      type: array
                      description: ''
                      items: { type: object, properties: { movement: { type: string, description: '', enum: [weighted_pull_up, weighted_dip, weighted_muscle_up, weighted_pistol] }, external_load_value: { type: [number, 'null'], description: 'Must be at least 0. Must not be greater than 400.' }, reps: { type: [integer, 'null'], description: 'Must be at least 1. Must not be greater than 30.' }, rir: { type: [integer, 'null'], description: 'Must be at least 0. Must not be greater than 10.' } }, required: [movement] }
                readiness_rating:
                  type:
                    - integer
                    - 'null'
                  description: 'Current readiness, 1-5. Must be at least 1. Must not be greater than 5.'
                sleep_quality:
                  type:
                    - integer
                    - 'null'
                  description: 'Recent sleep quality, 1-5. Must be at least 1. Must not be greater than 5.'
                soreness_level:
                  type:
                    - integer
                    - 'null'
                  description: 'Current soreness, 1-5. Must be at least 1. Must not be greater than 5.'
                pain_level:
                  type:
                    - integer
                    - 'null'
                  description: 'Current pain, 0-10. Must be at least 0. Must not be greater than 10.'
                pain_areas:
                  type: array
                  description: ''
                  items:
                    type: string
                    enum:
                      - wrist
                      - elbow
                      - shoulder
                      - neck
                      - back
                      - hip
                      - knee
                      - ankle
                      - general
                      - other
                pain_notes:
                  type:
                    - string
                    - 'null'
                  description: 'Private pain or limitation notes. Must not be greater than 1000 characters.'
                starter_plan_key:
                  type:
                    - string
                    - 'null'
                  description: 'Preferred starter plan shape.'
                  enum:
                    - full_body_3_day
                    - upper_lower_4_day
                    - push_pull_legs_3_to_6_day
                    - skill_strength_split
                    - short_maintenance
  /me/profile:
    get:
      summary: 'Get athlete profile'
      operationId: getAthleteProfile
      description: 'Returns the signed-in athlete profile and recommendation input settings.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string, description: 'Stable profile identifier.' }
                      user_id: { type: string, description: 'Owner user identifier.' }
                      display_name: { type: string, description: 'Profile display name.' }
                      timezone: { type: string }
                      unit_system: { type: string }
                      age_years: { type: integer }
                      training_age_months: { type: integer }
                      experience_level: { type: string }
                      current_bodyweight_value: { type: number }
                      bodyweight_unit: { type: string }
                      height_value: { type: integer }
                      height_unit: { type: string }
                      prior_sport_background: { type: array, items: { type: string } }
                      primary_goal: { type: string }
                      secondary_goals: { type: array, items: { type: string } }
                      target_skills: { type: array, items: { type: string } }
                      primary_target_skill: { type: string }
                      secondary_target_skills: { type: array, items: { type: string } }
                      long_term_target_skills: { type: array, items: { type: string } }
                      base_focus_areas: { type: array, items: { type: string } }
                      roadmap_suggestions: { type: object, properties: { level: { type: string }, summary: { type: string } } }
                      available_equipment: { type: array, items: { type: string } }
                      training_locations: { type: array, items: { type: string } }
                      movement_limitations: { type: array, items: { type: object, properties: { area: { type: string }, severity: { type: string }, status: { type: string }, notes: { type: string } } } }
                      baseline_tests: { type: object, properties: { push_ups: { type: object, properties: { progression: { type: string }, max_strict_reps: { type: integer }, form_quality: { type: integer } } }, rows: { type: object, properties: { progression: { type: string }, max_strict_reps: { type: integer } } }, pull_ups: { type: object, properties: { progression: { type: string }, max_strict_reps: { type: integer } } }, dips: { type: object, properties: { progression: { type: string }, support_hold_seconds: { type: integer } } }, hollow_hold_seconds: { type: integer }, wall_handstand_seconds: { type: integer } } }
                      skill_statuses: { type: object, properties: { handstand: { type: object, properties: { status: { type: string }, best_hold_seconds: { type: integer } } } } }
                      mobility_checks: { type: object, properties: { wrist_extension: { type: string }, shoulder_flexion: { type: string } } }
                      weighted_baselines: { type: object, properties: { experience: { type: string }, unit: { type: string }, movements: { type: array } } }
                      injury_notes: { type: string }
                      preferred_training_days: { type: array, items: { type: string } }
                      preferred_session_minutes: { type: integer }
                      weekly_session_goal: { type: integer }
                      preferred_training_time: { type: string }
                      progression_pace: { type: string }
                      intensity_preference: { type: string }
                      effort_tracking_preference: { type: string }
                      deload_preference: { type: string }
                      session_structure_preferences: { type: array, items: { type: string } }
                    required:
                      - id
                      - user_id
                      - display_name
                    description: 'Athlete profile settings.'
                required:
                  - data
      tags:
        - Profile
    patch:
      summary: 'Update athlete profile'
      operationId: updateAthleteProfile
      description: 'Creates or updates the signed-in athlete profile and recommendation input settings.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      user_id: { type: string }
                      display_name: { type: string }
                      timezone: { type: string }
                      unit_system: { type: string }
                      age_years: { type: integer }
                      training_age_months: { type: integer }
                      experience_level: { type: string }
                      current_bodyweight_value: { type: number }
                      bodyweight_unit: { type: string }
                      height_value: { type: integer }
                      height_unit: { type: string }
                      prior_sport_background: { type: array, items: { type: string } }
                      primary_goal: { type: string }
                      secondary_goals: { type: array, items: { type: string } }
                      target_skills: { type: array, items: { type: string } }
                      primary_target_skill: { type: string }
                      secondary_target_skills: { type: array, items: { type: string } }
                      long_term_target_skills: { type: array, items: { type: string } }
                      base_focus_areas: { type: array, items: { type: string } }
                      roadmap_suggestions: { type: object, properties: { level: { type: string }, summary: { type: string } } }
                      available_equipment: { type: array, items: { type: string } }
                      training_locations: { type: array, items: { type: string } }
